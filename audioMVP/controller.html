<!DOCTYPE html>
<html>
<body>
  <h2>Vader Controller</h2>

  <button onclick="send('PLAY_1')">YOU WILL FALL TO THE POWER OF THE DARK SIDE</button>
  <button onclick="send('IHAVE_COME')">I Have Come For You</button>
  <button onclick="send('IMPRESSIVE')">Most Impressive</button>
  <button onclick="send('NO')">No</button>
  <button onclick="send('YES')">Yes</button>
  <button onclick="send('WE_SHALL_SEE')">We Shall See</button>
  <button onclick="send('BREATH')">Breathing</button>
  <button onclick="send('STOP')">Stop</button>

  <p id="status">Connecting...</p>

  <script>
    let ws;

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${location.host}`;
      console.log('Connecting to WebSocket:', wsUrl);
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        document.getElementById("status").innerText = "Connected";
      };

      ws.onclose = () => {
        document.getElementById("status").innerText = "Reconnecting...";
        setTimeout(connect, 2000);
      };
    }

    function send(cmd) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(cmd);
      }
    }

    connect();
  </script>
</body>
</html>
