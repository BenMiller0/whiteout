<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VADER CONTROL INTERFACE</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><circle cx='30' cy='30' r='28' fill='none' stroke='%23cc0000' stroke-width='2'/><circle cx='30' cy='30' r='3.5' fill='%23cc0000'/><g stroke='%23cc0000' stroke-width='1.5'><line x1='30' y1='2' x2='30' y2='10'/><line x1='30' y1='50' x2='30' y2='58'/><line x1='2' y1='30' x2='10' y2='30'/><line x1='50' y1='30' x2='58' y2='30'/><line x1='9.4' y1='9.4' x2='15.5' y2='15.5'/><line x1='44.5' y1='44.5' x2='50.6' y2='50.6'/><line x1='50.6' y1='9.4' x2='44.5' y2='15.5'/><line x1='15.5' y1='44.5' x2='9.4' y2='50.6'/></g><g fill='%23cc0000' opacity='0.85'><path d='M30 3 A27 27 0 0 1 49.1 13.5 L44.5 15.5 A22 22 0 0 0 30 10 Z'/><path d='M49.1 46.5 A27 27 0 0 1 30 57 L30 50 A22 22 0 0 0 44.5 44.5 Z'/><path d='M10.9 46.5 A27 27 0 0 1 3 30 L10 30 A22 22 0 0 0 15.5 44.5 Z'/><path d='M49.1 13.5 A27 27 0 0 1 57 30 L50 30 A22 22 0 0 0 44.5 15.5 Z'/></g></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #cc0000;
      --red-glow: #ff2222;
      --red-dim: #440000;
      --amber: #ff8800;
      --amber-dim: #331a00;
      --green: #00ff88;
      --green-dim: #003320;
      --panel: #0a0a0a;
      --panel-mid: #111111;
      --panel-light: #1a1a1a;
      --border: #2a2a2a;
      --border-bright: #444444;
      --text-main: #ddddcc;
      --text-dim: #666655;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; font-family: 'Share Tech Mono', monospace; color: var(--text-main); min-height: 100vh; overflow-x: hidden; position: relative; }
    body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 1px, transparent 3px); pointer-events: none; z-index: 999; }
    
    #stars-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .outer-frame { max-width: 820px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }
    
    .header { display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); border-bottom: none; background: var(--panel); padding: 10px 20px; position: relative; overflow: hidden; }
    .header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--red), var(--red), transparent); }
    .header-title { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.1rem; letter-spacing: 0.3em; color: var(--red-glow); text-shadow: 0 0 20px var(--red); }
    
    .panel-body { border: 1px solid var(--border); background: rgba(10,10,10,0.93); padding: 24px; display: flex; flex-direction: column; gap: 20px; }
    
    .section { border: 1px solid var(--border); background: var(--panel-mid); position: relative; transition: all 0.3s; }
    .section-label { position: absolute; top: -10px; left: 14px; background: var(--panel-mid); padding: 0 8px; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--text-dim); font-family: 'Orbitron', sans-serif; }
    .section-inner { padding: 20px 16px 16px; }
    
    .section-breath { border-color: var(--red-dim); background: linear-gradient(160deg, #0f0000, #0d0d0d); }
    .section-breath.breathing-active { border-color: var(--red-glow); box-shadow: 0 0 28px rgba(200,0,0,0.25); }

    .btn { font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; padding: 12px 10px; border: 1px solid var(--border-bright); background: var(--panel-light); color: var(--text-main); cursor: pointer; text-transform: uppercase; position: relative; transition: all 0.2s; text-align: center; line-height: 1.3; overflow: hidden; }
    .btn::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--border-bright); transition: all 0.15s; }
    .btn::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15) 0%, transparent 70%); opacity: 0; transition: opacity 0.4s; }
    .btn.ripple::after { opacity: 1; transition: opacity 0s; }
    .btn:hover { background: #222; border-color: #888; color: #fff; }
    .btn:hover::before { background: #fff; box-shadow: 2px 0 8px rgba(255,255,255,0.5); }
    .btn:active { transform: scale(0.98); }

    .btn-breath-start { border-color: var(--red-dim); color: var(--red-glow); font-family: 'Orbitron', sans-serif; font-weight: 700; background: #0a0000; }
    .btn-breath-start.breath-inactive { opacity: 0.3; pointer-events: none; }
    .btn-breath-stop.breath-active { border-color: var(--red-glow); color: var(--red-glow); background: #1a0000; animation: breath-pulse 3s ease-in-out infinite; }
    
    .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn-wide { grid-column: span 2; }
    .yn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn-yes { color: var(--green); border-color: var(--green-dim); background: #001a0d; }
    .btn-no { color: var(--amber); border-color: var(--amber-dim); background: #1a0800; }

    /* Cooldown Bar */
    .cooldown-container { height: 4px; background: #111; margin: 0 20px; position: relative; border: 1px solid #222; display: none; }
    .cooldown-fill { height: 100%; background: var(--amber); width: 0%; box-shadow: 0 0 10px var(--amber); }
    .cooldown-label { position: absolute; right: 0; top: -12px; font-size: 0.5rem; color: var(--amber); letter-spacing: 0.1em; }

    .status-bar { border: 1px solid var(--border); border-top: none; background: rgba(10,10,10,0.93); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 15px; position: relative; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; transition: all 0.3s; }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.disconnected { background: var(--red); box-shadow: 0 0 8px var(--red); }
    .status-text { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--text-dim); }
    .status-text.connected { color: var(--green); }
    .status-text.disconnected { color: var(--red-glow); }
    
    .audio-toggle-container { display: flex; align-items: center; gap: 10px; cursor: pointer; border: 1px solid var(--border); padding: 5px 10px; background: var(--panel-mid); transition: all 0.3s; }
    .audio-toggle-container.active { border-color: var(--amber); color: var(--amber); }
    .toggle-led { width: 8px; height: 8px; border-radius: 50%; background: #222; border: 1px solid #444; }
    .active .toggle-led { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

    .corner-tl,.corner-tr,.corner-bl,.corner-br { position:absolute; width:12px; height:12px; border-color:var(--red); pointer-events: none; }
    .corner-tl { top:-1px; left:-1px; border-top:2px solid; border-left:2px solid; }
    .corner-tr { top:-1px; right:-1px; border-top:2px solid; border-right:2px solid; }
    .corner-bl { bottom:-1px; left:-1px; border-bottom:2px solid; border-left:2px solid; }
    .corner-br { bottom:-1px; right:-1px; border-bottom:2px solid; border-right:2px solid; }
    
    @keyframes breath-pulse { 0%,100% { box-shadow: 0 0 5px rgba(200,0,0,0.3); } 50% { box-shadow: 0 0 15px rgba(200,0,0,0.6); } }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="outer-frame">
  <div class="header">
    <div class="header-title">VADER CONTROL INTERFACE</div>
    <div class="imperial-crest">
      <svg viewBox="0 0 60 60" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
        <circle cx="30" cy="30" r="28" fill="none" stroke="#cc0000" stroke-width="1.2"/>
        <circle cx="30" cy="30" r="3.5" fill="#cc0000"/>
        <path d="M30 3 A27 27 0 0 1 49.1 13.5 L44.5 15.5 A22 22 0 0 0 30 10 Z" fill="#cc0000"/>
        <path d="M49.1 46.5 A27 27 0 0 1 30 57 L30 50 A22 22 0 0 0 44.5 44.5 Z" fill="#cc0000"/>
      </svg>
    </div>
  </div>

  <div class="panel-body">
    <div class="section section-breath" id="breathSection">
      <div class="corner-tl"></div><div class="corner-tr"></div>
      <div class="corner-bl"></div><div class="corner-br"></div>
      <div class="section-label">// RESPIRATION CONTROL</div>
      <div class="section-inner">
        <div class="breath-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <button class="btn btn-breath-start" id="btnBreathStart" onclick="startBreathing(this)">▶ INITIATE<br>BREATHING</button>
          <button class="btn btn-breath-stop" id="btnBreathStop" onclick="stopBreathing(this)">■ TERMINATE<br>BREATHING</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">// PHRASE DISPATCH</div>
      <div class="section-inner">
        <div class="cmd-grid">
          <button class="btn btn-wide" onclick="fireCmd(this,'PLAY_1')">YOU WILL FALL TO THE POWER OF THE DARK SIDE</button>
          <button class="btn btn-wide" onclick="fireCmd(this,'IHAVE_COME')">I HAVE COME FOR YOU</button>
          <button class="btn btn-wide" onclick="fireCmd(this,'IMPRESSIVE')">MOST IMPRESSIVE</button>
          <button class="btn" onclick="fireCmd(this,'WE_SHALL_SEE')">WE SHALL SEE</button>
          <button class="btn" onclick="fireCmd(this,'CONVENIENT')">CONVENIENT</button>
          <button class="btn btn-wide" onclick="fireCmd(this,'DELUSION')">IT IS DELUSION</button>
          <button class="btn" onclick="fireCmd(this,'WEAK')">SO WEAK</button>
          <button class="btn" onclick="fireCmd(this,'BURN')">BURN ARCHIVE</button>
          <button class="btn btn-wide" onclick="fireCmd(this,'ESCAPE')">YOU SHALL NOT ESCAPE</button>
          <button class="btn btn-wide" onclick="fireCmd(this,'WASTE_TIME')">YOU WASTE TIME</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">// BINARY RESPONSE</div>
      <div class="section-inner">
        <div class="yn-grid">
          <button class="btn btn-yes" onclick="fireCmd(this,'YES')">◆ YES</button>
          <button class="btn btn-no"  onclick="fireCmd(this,'NO')">◆ NO</button>
        </div>
      </div>
    </div>
  </div>

  <div class="cooldown-container" id="cooldownContainer">
    <div class="cooldown-label">RECHARGE_SYNC</div>
    <div class="cooldown-fill" id="cooldownFill"></div>
  </div>

  <div class="status-bar">
    <div class="status-indicator" style="display:flex; align-items:center; gap:8px;">
      <div class="status-dot disconnected" id="statusDot"></div>
      <span class="status-text disconnected" id="status">CONNECTING...</span>
    </div>
    
    <div class="audio-toggle-container" id="localAudioToggle" onclick="toggleLocalAudio()">
      <div class="toggle-led"></div>
      <span style="font-size:0.6rem; letter-spacing:0.1em;">LOCAL_AUDIO</span>
    </div>

    <div id="lastCmd" style="font-size:0.6rem; color:var(--text-dim); text-align:right;">LAST CMD: —</div>
  </div>
</div>

<script>
// ── STAR FIELD ──
(function(){
  const c = document.getElementById('stars-canvas');
  const x = c.getContext('2d');
  let stars = [];
  function resize(){ c.width = innerWidth; c.height = innerHeight; }
  function init(){ resize(); stars = Array.from({length:150}, () => ({ x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*1.1, a:Math.random(), da: Math.random()*0.01 })); }
  function draw(){
    x.clearRect(0,0,c.width,c.height);
    stars.forEach(s => {
      s.a += s.da; if(s.a<=0 || s.a>=1) s.da*=-1;
      x.beginPath(); x.arc(s.x, s.y, s.r, 0, Math.PI*2);
      x.fillStyle = `rgba(255,255,255,${Math.abs(s.a)})`; x.fill();
    });
    requestAnimationFrame(draw);
  }
  window.onresize = resize; init(); draw();
})();

// ── STATE & CONFIG ──
let breathingOn = false;
let localAudioEnabled = false;
let globalCooldown = 0;
let audioDurations = {};
let ws;

const audioFiles = {
  'BREATH':     'audio/breathing.mp3',
  'PLAY_1':     'audio/youwillfalltothepowerofthedarkside.mp3',
  'IHAVE_COME': 'audio/ihavecomeforyou.mp3',
  'IMPRESSIVE': 'audio/mostimpressive.mp3',
  'WE_SHALL_SEE':'audio/weshallsee.mp3',
  'CONVENIENT': 'audio/howconvenient.mp3',
  'DELUSION':   'audio/itisdelusion.mp3',
  'WEAK':       'audio/soweak.mp3',
  'BURN':       'audio/thisarchivewillburn.mp3',
  'ESCAPE':     'audio/youshallnotescapemethistime.mp3',
  'WASTE_TIME': 'audio/youwastetime.mp3',
  'YES':        'audio/yes.mp3',
  'NO':         'audio/no.mp3'
};

function loadAudioDurations() {
  for (const [cmd, path] of Object.entries(audioFiles)) {
    const tmp = new Audio(path);
    tmp.addEventListener('loadedmetadata', () => { audioDurations[cmd] = tmp.duration * 1000; });
    tmp.addEventListener('error', () => { audioDurations[cmd] = 2500; });
  }
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen = () => {
    document.getElementById('statusDot').className = 'status-dot connected';
    const t = document.getElementById('status');
    t.textContent = 'LINK_ESTABLISHED'; t.className = 'status-text connected';
  };
  ws.onclose = () => {
    document.getElementById('statusDot').className = 'status-dot disconnected';
    const t = document.getElementById('status');
    t.textContent = 'LINK_LOST_RECONNECTING...'; t.className = 'status-text disconnected';
    setTimeout(connect, 3000);
  };
}

function toggleLocalAudio() {
  localAudioEnabled = !localAudioEnabled;
  document.getElementById('localAudioToggle').classList.toggle('active', localAudioEnabled);
}

function fireCmd(btn, cmd) {
  const now = Date.now();
  if (now < globalCooldown) return;

  // Visual Ripple
  btn.classList.remove('ripple'); void btn.offsetWidth; btn.classList.add('ripple');
  setTimeout(() => btn.classList.remove('ripple'), 400);

  document.getElementById('lastCmd').textContent = `LAST CMD: ${cmd}`;
  
  // WebSocket Dispatch
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'cmd', command: cmd, timestamp: now }));
  }

  // Local Audio
  if (localAudioEnabled && audioFiles[cmd]) {
    new Audio(audioFiles[cmd]).play();
  }

  // Cooldown calculation
  const duration = audioDurations[cmd] || 2500;
  globalCooldown = now + duration + 500;
  showCooldown(duration + 500);
}

function showCooldown(ms) {
  const container = document.getElementById('cooldownContainer');
  const fill = document.getElementById('cooldownFill');
  container.style.display = 'block';
  
  const start = Date.now();
  function update() {
    const elapsed = Date.now() - start;
    const progress = Math.min(elapsed / ms, 1);
    fill.style.width = (progress * 100) + '%';
    if (progress < 1) requestAnimationFrame(update);
    else setTimeout(() => { container.style.display = 'none'; }, 200);
  }
  requestAnimationFrame(update);
}

function startBreathing(btn) {
  breathingOn = true;
  document.getElementById('breathSection').classList.add('breathing-active');
  document.getElementById('btnBreathStop').classList.add('breath-active');
  document.getElementById('btnBreathStart').classList.add('breath-inactive');
  fireCmd(btn, 'BREATH');
}

function stopBreathing(btn) {
  breathingOn = false;
  document.getElementById('breathSection').classList.remove('breathing-active');
  document.getElementById('btnBreathStop').classList.remove('breath-active');
  document.getElementById('btnBreathStart').classList.remove('breath-inactive');
  fireCmd(btn, 'STOP');
}

loadAudioDurations();
connect();
</script>
</body>
</html>
