<!DOCTYPE html>
<html>
<body>
  <h2>Vader Controller</h2>

  <button onclick="send('PLAY_1')">youwillfalltothepowerofthedarkside.mp3</button>
  <button onclick="send('PLAY_2')">Line 2</button>
  <button onclick="send('BREATH')">Breathing</button>
  <button onclick="send('STOP')">Stop</button>

  <p id="status">Connecting...</p>

  <script>
    const ws = new WebSocket(`wss://${location.host}`);

    ws.onopen = () => {
      document.getElementById("status").innerText = "Connected";
    };

    function send(cmd) {
      ws.send(cmd);
    }
  </script>
</body>
</html>
